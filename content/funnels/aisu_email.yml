  text: |-
    Добрый день! За эти дни мы затронули самые глубокие, сакральные и важные пласты человеческого бытия: мы поговорили о тонкоплановом очищении, избавлении от сущностей и негативных влияний, Ведическом коучинге, деньгах как Божественной энергии, взаимосвязи внутренних состояний и жизненных процессов и законах нейрофизиологии. Теперь вы владеете этим знанием, вы увидели изнанку процессов. И ваша реальность уже никогда не сможет стать прежней — спать дальше в автоматических программах у вас просто не получится.

    Прямо сейчас вы находитесь в классической, поворотной точке выбора. Перед вами две дороги. Первая — закрыть этот чат, списать всё на красивую теорию и вернуться к привычному дню сурка, к старым способам коммуникации, зажимам в теле и финансовым ограничениям. Вторая дорога — довериться своему внутреннему импульсу, сделать шаг в расширение и пойти в обучение и трансформацию в Школе «Сатья Юга».

    Это безопасное, поддерживающее, кристально чистое духовное пространство, где под моим ведением вы пошагово пройдёте тотальную перезагрузку всех сфер жизни, обретёте несокрушимый внутренний ресурс и сможете развивать свою осознанность как Души. Обучение идёт в вашем индивидуальном, комфортном темпе. Если вы не будете успевать по времени, обучение можно продлить. Если ваша Душа сейчас откликается на мои слова — не предавайте этот зов. Я жду вас на той стороне. Пришло ли время перемен и глубоких знаний?
